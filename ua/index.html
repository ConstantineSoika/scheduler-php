<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Записатися на зустріч</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: #F4F6FF;
      color: #1C1C28;
    }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    nav {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(40,99,224,.1);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 17px;
      font-weight: 700;
      color: #2863E0;
      letter-spacing: -.3px;
      text-decoration: none;
    }
    .nav-brand span { color: #7F5AF0; }
    nav a.nav-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      color: #6B7A99;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #e0e6f4;
      transition: background .15s, color .15s;
    }
    nav a.nav-link:hover {
      background: #2863E0;
      color: #fff;
      border-color: #2863E0;
    }

    /* ── Hero ────────────────────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #2863E0 0%, #7F5AF0 100%);
      padding: 64px 24px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .hero-tag {
      display: inline-block;
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.25);
    }
    .hero h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      line-height: 1.15;
    }
    .hero p {
      margin: 0 auto;
      font-size: 16px;
      color: rgba(255,255,255,.8);
      max-width: 480px;
      line-height: 1.6;
    }

    /* ── Widget wrapper ──────────────────────────────────────────────────── */
    .widget-section {
      max-width: 700px;
      margin: -36px auto 48px;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">Scheduler<span>.</span></a>
  <a href="/settings" class="nav-link">⚙ Налаштування</a>
</nav>

<div class="hero">
  <div class="hero-tag">📅 Онлайн-запис</div>
  <h1>Запишіться на зустріч<br>за секунди</h1>
  <p>Оберіть зручний час. Миттєве підтвердження, без зайвого листування.</p>
</div>

<div class="widget-section">
  <div id="scheduling-widget"></div>
</div>

<footer>Powered by Scheduler</footer>

<script src="/widget.js" data-container="#scheduling-widget"></script>
<script async src="https://static.sppopups.com/assets/loader.js" data-chats-widget-id="6877b038-8db1-4d9e-80d4-4d3d3bfe7ddc"></script>
</body>
</html>
